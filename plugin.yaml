id: moveit-arm
version: 0.1.0
class_path: moveit_arm_node.node:MoveItArmNode
spec_version: "1.0.0"
vendor: moveit
model: arm
# Inputs/outputs mirror dora-moveit2's user_node interface (which moveit_arm_node
# replaces) since MoveGroup shares this node and drives those topics, plus the
# SPEC bridge topics and the gripper.
inputs:
  - cmd_request
  - joint_positions
  - trajectory
  - plan_status
  - ik_solution
  - ik_status
  - execution_status
  - command_result
outputs:
  - cmd_response
  - capabilities
  - state
  - safety_event
  - plan_request
  - ik_request
  - scene_command
  - cartesian_trajectory
  - gripper_command
config:
  gripper_driver: "mujoco"
  robot_config_module: "ur5e"
  heartbeat_timeout_ms: 1000
restart_policy: on-failure
